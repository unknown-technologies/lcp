<html>
	<head>
		<title>Project Window</title>
	</head>
	<body>
		<h1>Project Window</h1>
		<p>The project window contains all tracks and clips of the project.</p>

		<h2>Mouse</h2>
		<table border="0" cellpadding="2" cellspacing="1">
			<tr>
				<th>Key</th>
				<th>Action</th>
			</tr>

			<tr><td style="text-align: center"><code>Left</code></td><td>Select or move a clip</td></tr>
			<tr><td style="text-align: center"><code>Right</code></td><td>Open context menu</td></tr>
			<tr><td style="text-align: center"><code>Middle</code></td><td>Move the viewport</td></tr>
			<tr><td style="text-align: center"><code>ALT</code>-<code>Left</code></td><td>Draw new clip</td></tr>
			<tr><td style="text-align: center"><code>CTRL</code>-<code>Left</code></td><td>Copy clip</td></tr>
			<tr><td style="text-align: center"><code>CTRL</code>-<code>SHIFT</code>-<code>Left</code></td><td>Create shared copy of clip</td></tr>
			<tr><td style="text-align: center"><code>CTRL</code>-<code>Wheel</code></td><td>Zoom (time)</td></tr>
		</table>
	</body>
</html>
